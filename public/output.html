<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Output</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #e63946;
      --secondary: #1d3557;
      --text-color: #ffffff;
      --font: Arial, sans-serif;
    }

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: var(--font);
      color: var(--text-color);
      position: relative;
    }

    /* ─── Animations ─────────────────────────────────────────────────────── */
    @keyframes slideInLeft {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOutLeft {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(-100%); opacity: 0; }
    }
    @keyframes slideInUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideOutDown {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(40px); opacity: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    @keyframes expandWidth {
      from { width: 0; }
      to { width: 100%; }
    }
    @keyframes ticker-scroll {
      from { transform: translateX(100%); }
      to { transform: translateX(-100%); }
    }
    @keyframes popIn {
      0% { transform: scale(0.6); opacity: 0; }
      80% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes popOut {
      from { transform: scale(1); opacity: 1; }
      to { transform: scale(0.6); opacity: 0; }
    }

    .graphic-show { animation-fill-mode: forwards; }
    .graphic-hide { animation-fill-mode: forwards; }

    /* ─── Z-index layers ────────────────────────────────────────────────── */
    .ticker { z-index: 10; }
    .lower_third { z-index: 20; }
    .score-graphic { z-index: 30; }
    .message { z-index: 40; }
    .timer-graphic { z-index: 15; }
    .image-graphic { z-index: 5; }
    .agenda { z-index: 18; }
    .social-comments { z-index: 25; }

    /* ─── Draggable ──────────────────────────────────────────────────── */
    .graphic-draggable { cursor: move; }
    .graphic-draggable:active { cursor: grabbing; }

    /* ─── Lower Third ────────────────────────────────────────────────────── */
    .lower_third {
      --scale: 1.25;
      position: absolute;
      bottom: 80px;
      left: 60px;
      display: flex;
      flex-direction: column;
      max-width: calc(700px * var(--scale));
    }
    .lower_third .lt-bar {
      height: calc(4px * var(--scale));
      background: var(--primary);
      border-radius: 2px 2px 0 0;
      animation: expandWidth 0.4s ease forwards;
    }
    .lower_third .lt-body {
      background: linear-gradient(135deg, var(--secondary), rgba(29,53,87,0.95));
      backdrop-filter: blur(12px);
      padding: calc(16px * var(--scale)) calc(28px * var(--scale));
      border-radius: 0 0 6px 6px;
      border-left: 4px solid var(--primary);
    }
    .lower_third .lt-title {
      font-size: calc(32px * var(--scale));
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .lower_third .lt-subtitle {
      font-size: calc(20px * var(--scale));
      font-weight: 400;
      opacity: 0.85;
      margin-top: calc(4px * var(--scale));
    }
    .lower_third.graphic-show { animation: slideInLeft 0.5s ease forwards; }
    .lower_third.graphic-hide { animation: slideOutLeft 0.4s ease forwards; }

    /* ─── Message ────────────────────────────────────────────────────────── */
    .message {
      --scale: 1.25;
      position: absolute;
      top: 50px;
      left: 0; right: 0;
      margin-left: auto; margin-right: auto;
      width: fit-content;
      max-width: calc(900px * var(--scale));
      text-align: center;
    }
    .message .msg-badge {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: calc(14px * var(--scale));
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: calc(6px * var(--scale)) calc(20px * var(--scale));
      border-radius: 4px 4px 0 0;
    }
    .message .msg-body {
      background: linear-gradient(135deg, var(--secondary), rgba(29,53,87,0.95));
      backdrop-filter: blur(12px);
      padding: calc(20px * var(--scale)) calc(40px * var(--scale));
      border-radius: 0 6px 6px 6px;
      border-top: 3px solid var(--primary);
    }
    .message .msg-text {
      font-size: calc(36px * var(--scale));
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .message .msg-detail {
      font-size: calc(20px * var(--scale));
      opacity: 0.85;
      margin-top: calc(8px * var(--scale));
    }
    .message.graphic-show { animation: slideInUp 0.5s ease forwards; }
    .message.graphic-hide { animation: slideOutDown 0.4s ease forwards; }

    /* ─── Ticker ─────────────────────────────────────────────────────────── */
    .ticker {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: linear-gradient(90deg, var(--secondary), rgba(29,53,87,0.95));
      border-top: 3px solid var(--primary);
      overflow: hidden;
      display: flex;
      align-items: center;
    }
    .ticker .ticker-label {
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 20px;
      height: 100%;
      display: flex;
      align-items: center;
      white-space: nowrap;
      z-index: 2;
      position: relative;
    }
    .ticker .ticker-track {
      flex: 1;
      overflow: hidden;
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
    }
    .ticker .ticker-content {
      display: flex;
      gap: 60px;
      white-space: nowrap;
      font-size: 20px;
      font-weight: 500;
      padding-left: 20px;
    }
    .ticker .ticker-content span {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .ticker .ticker-content span::before {
      content: '●';
      color: var(--primary);
      font-size: 8px;
    }
    .ticker.graphic-show { animation: slideInUp 0.4s ease forwards; }
    .ticker.graphic-hide { animation: slideOutDown 0.3s ease forwards; }

    /* ─── Agenda ─────────────────────────────────────────────────────────── */
    /* Solo choreography:
       INTO solo  — single 0 → 0.4s motion: title + non-current items collapse fast (0-0.16s)
                    while the .agenda simultaneously slides to the solo slot, min-height releases,
                    and the body/current item morph. The flex-column + justify-content:flex-end
                    plus the frozen min-height keeps the body bottom-anchored during the collapse,
                    so the whole transition reads as one continuous downward motion.
       OUT solo   — phase 1 (0 → 0.40s): position floats back + body/current morph back + title expands.
                    phase 2 (0.40 → 0.58s): non-current items expand back. */
    .agenda {
      --scale: 1.25;
      position: absolute;
      top: 80px;
      left: 60px;
      max-width: calc(520px * var(--scale));
      /* Anchor content to the bottom: during INTO-solo we freeze min-height at the
         list's measured size so the body collapses downward (bottom fixed) instead
         of shrinking upward from a fixed top. */
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      /* OUT-of-solo: position moves immediately back to the list slot.
         min-height has no transition here — it's set instantly when freezing
         the list height at the start of INTO-solo. */
      transition: top 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  left 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  right 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  max-width 0.4s ease;
    }
    .agenda.solo {
      /* INTO-solo: position and min-height slide in one motion with the item collapse —
         no delay, so the container starts moving to the solo slot immediately. */
      transition: top 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  left 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  right 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  max-width 0.4s ease,
                  min-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .agenda .agenda-body {
      background: linear-gradient(135deg, var(--secondary), rgba(29,53,87,0.95));
      backdrop-filter: blur(12px);
      padding: calc(24px * var(--scale)) calc(32px * var(--scale));
      border-radius: 8px;
      border-left: 4px solid var(--primary);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      /* OUT-of-solo: body restyles in parallel with position */
      transition: background 0.4s ease, padding 0.4s ease, border-left-color 0.4s ease, border-left-width 0.4s ease, box-shadow 0.4s ease, backdrop-filter 0.4s ease, border-radius 0.4s ease;
    }
    .agenda.solo .agenda-body {
      /* INTO-solo: decorations (background, border-left, border-radius, box-shadow,
         backdrop-filter) snap out immediately so no ghost frame lingers around the
         current item. Only padding stays in the transition list so the layout
         collapse is still smooth. */
      transition: padding 0.4s ease;
      background: transparent;
      padding: 0;
      border-left-width: 0;
      border-radius: 0;
      box-shadow: none;
      backdrop-filter: blur(0);
    }
    .agenda .agenda-title {
      font-size: calc(22px * var(--scale));
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--primary);
      padding-bottom: calc(12px * var(--scale));
      margin-bottom: calc(16px * var(--scale));
      border-bottom: 2px solid rgba(255,255,255,0.1);
      max-height: calc(300px * var(--scale));
      overflow: hidden;
      /* Render embedded newlines as actual line breaks for multi-line titles */
      white-space: pre-line;
      /* Anchor text to the bottom so collapse appears to fold the title downward */
      display: flex;
      align-items: flex-end;
      /* OUT-of-solo: title expands immediately in phase 1 (no delay) so the heading is present as the list view engages */
      transition: max-height 0.4s ease, opacity 0.3s ease, padding 0.4s ease, margin 0.4s ease, border-color 0.3s ease;
    }
    .agenda .agenda-list {
      list-style: none;
      counter-reset: agenda;
      display: flex;
      flex-direction: column;
      gap: calc(2px * var(--scale));
      padding: 0;
      margin: 0;
      /* Transition gap so it can smoothly close up in solo (where items before
         the current have max-height 0 but would otherwise contribute gap space,
         shifting the current item's position based on its index). */
      transition: gap 0.16s ease;
    }
    .agenda.solo .agenda-list {
      /* In solo, drop the inter-item gap so hidden items contribute zero vertical
         offset — the current item always lands at list.top regardless of its
         index, so the solo lower-third sits at the same height for every pick. */
      gap: 0;
    }
    .agenda .agenda-item {
      counter-increment: agenda;
      font-size: calc(22px * var(--scale));
      font-weight: 600;
      line-height: 1.3;
      display: flex;
      /* Anchor content (number + text) at the BOTTOM of the box so collapse folds downward */
      align-items: flex-end;
      gap: calc(14px * var(--scale));
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      padding: calc(4px * var(--scale)) calc(12px * var(--scale));
      border-radius: 6px;
      max-height: calc(120px * var(--scale));
      overflow: hidden;
      /* OUT-of-solo: current item morph happens in parallel with position; non-current items expand AFTER */
      transition: font-size 0.4s ease, background 0.35s ease, color 0.35s ease, border-radius 0.35s ease, box-shadow 0.4s ease, gap 0.4s ease, padding 0.4s ease,
                  max-height 0.18s ease 0.4s, opacity 0.16s ease 0.4s, margin 0.18s ease 0.4s;
    }
    .agenda .agenda-item:not(.agenda-current) {
      /* Non-current items: expansion (incl. padding) is delayed until position has settled */
      transition: max-height 0.18s ease 0.4s, opacity 0.16s ease 0.4s, padding 0.18s ease 0.4s, margin 0.18s ease 0.4s;
    }
    .agenda .agenda-item::before {
      content: counter(agenda) ".";
      color: var(--primary);
      font-weight: 700;
      min-width: calc(28px * var(--scale));
      flex-shrink: 0;
      transition: min-width 0.4s ease, opacity 0.35s ease, color 0.35s ease;
    }
    .agenda .agenda-sub {
      font-size: calc(17px * var(--scale));
      font-weight: 400;
      line-height: 1.3;
      opacity: 0.78;
      margin-left: calc(42px * var(--scale));
      display: flex;
      /* Anchor content at bottom so collapse folds downward */
      align-items: flex-end;
      gap: calc(10px * var(--scale));
      padding: calc(2px * var(--scale)) calc(12px * var(--scale));
      border-radius: 6px;
      max-height: calc(120px * var(--scale));
      overflow: hidden;
      /* OUT-of-solo: sub-items expand AFTER position has settled */
      transition: max-height 0.18s ease 0.4s, opacity 0.16s ease 0.4s, padding 0.18s ease 0.4s, margin 0.18s ease 0.4s;
    }
    .agenda .agenda-sub::before {
      content: '–';
      color: var(--primary);
      opacity: 0.7;
      flex-shrink: 0;
    }
    .agenda .agenda-current {
      background: var(--primary);
      color: #fff;
      opacity: 1;
      box-shadow: inset 0 0 0 transparent, 0 4px 16px rgba(0,0,0,0.35);
    }
    .agenda .agenda-current::before {
      color: #fff;
    }
    .agenda.has-current .agenda-item:not(.agenda-current):not(.agenda-current-parent),
    .agenda.has-current .agenda-sub:not(.agenda-current):not(.agenda-current-sub) {
      opacity: 0.45;
    }
    .agenda .agenda-current-sub,
    .agenda .agenda-current-parent {
      opacity: 1;
    }
    /* Solo mode: hide everything except the current main item, morph it into a lower-third */
    .agenda.solo .agenda-title {
      /* INTO-solo: opacity snaps to 0 instantly so the title vanishes right away;
         max-height/padding/margin still transition so the layout folds smoothly. */
      transition: max-height 0.16s ease, padding 0.16s ease, margin 0.16s ease, border-color 0.14s ease;
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-top: 0;
      margin-bottom: 0;
      border-bottom-color: transparent;
    }
    .agenda.solo .agenda-item:not(.agenda-current),
    .agenda.solo .agenda-sub:not(.agenda-current) {
      /* INTO-solo: non-current items collapse fast (phase 1) */
      transition: max-height 0.16s ease, opacity 0.14s ease, padding 0.16s ease, margin 0.16s ease;
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-top: 0;
      margin-bottom: 0;
    }
    .agenda.solo .agenda-sub.agenda-current {
      /* In solo, a highlighted sub-item gets the same lower-third morph as a main.
         Reset the sub-item's indent so it lands in the standard solo slot. */
      margin-left: 0;
    }
    .agenda.solo .agenda-current {
      /* INTO-solo: current item morphs in parallel with the slide (no delay). */
      transition: font-size 0.4s ease, background 0.35s ease, color 0.35s ease,
                  border-radius 0.35s ease, box-shadow 0.4s ease, gap 0.4s ease, padding 0.4s ease;
      font-size: calc(32px * var(--scale));
      font-weight: 700;
      gap: 0;
      padding: calc(16px * var(--scale)) calc(28px * var(--scale));
      background: linear-gradient(135deg, var(--secondary), rgba(29,53,87,0.95));
      color: #fff;
      border-radius: 0 6px 6px 0;
      box-shadow: inset calc(4px * var(--scale)) 0 0 var(--primary), 0 8px 32px rgba(0,0,0,0.4);
    }
    .agenda.solo .agenda-current::before {
      /* INTO-solo: number badge fades with the morph (no delay, in parallel with slide). */
      transition: min-width 0.35s ease, opacity 0.3s ease, color 0.3s ease;
      min-width: 0;
      opacity: 0;
      color: transparent;
    }
    /* Solo with heading visible: keep the title rendered, restyled as a lower-third header bar.
       Override the default solo title-collapse rules. */
    .agenda.solo.solo-show-heading .agenda-title {
      max-height: calc(300px * var(--scale));
      opacity: 1;
      padding-top: calc(10px * var(--scale));
      padding-bottom: calc(10px * var(--scale));
      margin-top: 0;
      margin-bottom: 0;
      border-bottom: none;
      background: linear-gradient(135deg, var(--primary), rgba(230,57,70,0.92));
      color: #fff;
      border-radius: 6px 6px 0 0;
      padding-left: calc(28px * var(--scale));
      padding-right: calc(28px * var(--scale));
      font-size: calc(18px * var(--scale));
      box-shadow: inset calc(4px * var(--scale)) 0 0 var(--secondary);
    }
    /* When both heading and item are shown, square the corners between them */
    .agenda.solo.solo-show-heading.solo-show-item .agenda-current {
      border-radius: 0 0 6px 0;
    }
    /* Solo with item hidden: collapse the current item too */
    .agenda.solo:not(.solo-show-item) .agenda-current {
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-top: 0;
      margin-bottom: 0;
      overflow: hidden;
    }
    .agenda.graphic-show { animation: slideInLeft 0.5s ease forwards; }
    .agenda.graphic-hide { animation: slideOutLeft 0.4s ease forwards; }

    /* ─── Image ──────────────────────────────────────────────────────────── */
    .image-graphic {
      position: absolute;
      inset: 0;
      margin: auto;
      width: fit-content;
      height: fit-content;
    }
    .image-graphic img {
      max-width: calc(640px * var(--scale, 1.25));
      max-height: calc(480px * var(--scale, 1.25));
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .image-graphic.no-shadow img { box-shadow: none; }
    .image-graphic.graphic-show { animation: fadeIn 0.5s ease forwards; }
    .image-graphic.graphic-hide { animation: fadeOut 0.4s ease forwards; }

    /* ─── Timer ──────────────────────────────────────────────────────────── */
    .timer-graphic {
      --scale: 1.25;
      position: absolute;
      inset: 0;
      margin: auto;
      width: fit-content;
      height: fit-content;
      text-align: center;
    }
    .timer-graphic .timer-label {
      font-size: calc(24px * var(--scale));
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.8;
      margin-bottom: calc(8px * var(--scale));
    }
    .timer-graphic .timer-display {
      font-size: calc(120px * var(--scale));
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 4px 20px rgba(0,0,0,0.4);
      background: linear-gradient(135deg, var(--primary), #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .timer-graphic .timer-bg {
      background: linear-gradient(135deg, var(--secondary), rgba(29,53,87,0.9));
      backdrop-filter: blur(12px);
      padding: calc(30px * var(--scale)) calc(60px * var(--scale));
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.1);
    }
    .timer-graphic.graphic-show { animation: popIn 0.5s ease forwards; }
    .timer-graphic.graphic-hide { animation: popOut 0.3s ease forwards; }

    /* ─── Score ──────────────────────────────────────────────────────────── */
    .score-graphic {
      position: absolute;
      top: 30px;
      left: 0; right: 0;
      margin-left: auto; margin-right: auto;
      width: fit-content;
      display: flex;
      align-items: stretch;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .score-team {
      padding: 14px 30px;
      text-align: center;
      min-width: 200px;
    }
    .score-team .team-name {
      font-size: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.9;
    }
    .score-team .team-score {
      font-size: 56px;
      font-weight: 800;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }
    .score-vs {
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .score-graphic.graphic-show { animation: popIn 0.5s ease forwards; }
    .score-graphic.graphic-hide { animation: popOut 0.3s ease forwards; }

    /* ─── Social comments ────────────────────────────────────────────────── */
    .social-comments {
      --scale: 1;
      position: absolute;
      bottom: 100px;
      right: 60px;
      width: calc(480px * var(--scale));
      display: flex;
      flex-direction: column-reverse;
      gap: calc(10px * var(--scale));
      pointer-events: none;
    }
    .social-comments .sc-item {
      background: linear-gradient(135deg, rgba(20,22,36,0.92), rgba(29,53,87,0.88));
      backdrop-filter: blur(12px);
      border-radius: 10px;
      padding: calc(12px * var(--scale)) calc(16px * var(--scale));
      border-left: 4px solid var(--primary);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      animation: slideInLeft 0.35s ease forwards;
    }
    .social-comments .sc-item.platform-twitch { border-left-color: #9146ff; }
    .social-comments .sc-item.platform-youtube { border-left-color: #ff0000; }
    .social-comments .sc-item.platform-kick { border-left-color: #53fc18; }
    .social-comments .sc-item.platform-x { border-left-color: #1d9bf0; }
    .social-comments .sc-head {
      display: flex;
      align-items: center;
      gap: calc(8px * var(--scale));
      margin-bottom: calc(4px * var(--scale));
    }
    .social-comments .sc-avatar {
      width: calc(28px * var(--scale));
      height: calc(28px * var(--scale));
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      object-fit: cover;
      flex-shrink: 0;
    }
    .social-comments .sc-author {
      font-size: calc(15px * var(--scale));
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .social-comments .sc-badge {

<body>
  <div id="graphicsContainer"></div>
  <style id="customCSS"></style>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const PROJECT_ID = window.location.pathname.split('/')[2];
    const IS_PREVIEW = window.location.pathname.startsWith('/preview/');
    const socket = io();
    let project = null;
    const liveGraphics = new Map(); // id -> DOM element
    const timerStates = new Map(); // id -> { interval, remaining, running }

    // Parse ?bg= param
    const params = new URLSearchParams(window.location.search);
    const bg = params.get('bg');
    if (bg) document.body.style.background = bg;

    socket.emit('join', PROJECT_ID);

    socket.on('project:update', (p) => {
      const oldProject = project;
      project = p;
      applyTheme(p.theme);

      // Output shows what's live now.
      // Preview shows the projected result after pressing Run:
      //   live + not cued → still on-air
      //   live + cued     → will go off-air
      //   !live + cued    → will go on-air
      //   !live + !cued   → stays off
      const shouldShow = IS_PREVIEW
        ? (g) => g.isCued ? !g.isLive : g.isLive
        : (g) => g.isLive;

      p.graphics.forEach(g => {
        if (shouldShow(g) && !liveGraphics.has(g.id)) {
          showGraphic(g);
        } else if (!shouldShow(g) && liveGraphics.has(g.id)) {
          hideGraphic(g);
        } else if (shouldShow(g) && liveGraphics.has(g.id)) {
          // Update content in-place
          updateGraphicContent(g);
        }
      });
      // Hide graphics that were removed
      for (const [id] of liveGraphics) {
        if (!p.graphics.find(g => g.id === id)) {
          hideGraphicById(id);
        }
      }
    });

    // Preview relies solely on project:update for cued state;
    // Output also responds to direct show/hide events for lower latency
    if (!IS_PREVIEW) {
      socket.on('graphic:show', (g) => {
        if (!liveGraphics.has(g.id)) showGraphic(g);
      });

      socket.on('graphic:hide', (g) => {
        hideGraphic(g);
      });
    }

    socket.on('graphic:update', (g) => {
      if (liveGraphics.has(g.id)) updateGraphicContent(g);
    });

    socket.on('graphic:reposition', ({ graphicId, position, slot }) => {
      const el = liveGraphics.get(graphicId);
      if (!el || !position) return;
      // Only apply if the broadcast slot matches the element's currently displayed mode.
      const elSlot = el.classList.contains('solo') ? 'solo' : null;
      const eventSlot = slot === 'solo' ? 'solo' : null;
      if (elSlot === eventSlot) applyPosition(el, position.x, position.y);
    });

    socket.on('timer:action', ({ id, action, seconds }) => {
      const ts = timerStates.get(id);
      if (!ts) return;
      switch (action) {
        case 'run': startTimer(id); break;
        case 'pause': pauseTimer(id); break;
        case 'reset': resetTimer(id); break;
        case 'jump':
          ts.remaining += seconds;
          if (ts.remaining < 0) ts.remaining = 0;
          renderTimer(id);
          break;
        case 'duration':
          ts.duration = seconds;
          ts.remaining = seconds;
          renderTimer(id);
          break;
      }
    });

    // ─── Theme ─────────────────────────────────────────────────────────────
    function applyTheme(theme) {
      if (!theme) return;
      document.documentElement.style.setProperty('--primary', theme.primaryColor);
      document.documentElement.style.setProperty('--secondary', theme.secondaryColor);
      document.documentElement.style.setProperty('--text-color', theme.textColor);
      document.documentElement.style.setProperty('--font', theme.fontFamily);
      document.body.style.fontFamily = theme.fontFamily;
      document.body.setAttribute('data-style', theme.style || 'classic');
      document.getElementById('customCSS').textContent = theme.customCSS || '';
    }

    // ─── Variable replacement ──────────────────────────────────────────────
    function replaceVars(text) {
      if (!project || !text) return text || '';
      // [text.1], [text.2], [text.3]
      text = text.replace(/\[text\.(\d+)\]/g, (_, n) => {
        const v = project.variables.text.find(t => t.id === `text.${n}`);
        return v ? v.value : '';
      });
      // [list1.1], [list1.2] - selected row
      text = text.replace(/\[list(\d+)\.(\d+)\]/g, (_, listNum, colNum) => {
        const list = project.variables.lists[parseInt(listNum) - 1];
        if (!list || list.selectedRow < 0 || !list.rows[list.selectedRow]) return '';
        return list.rows[list.selectedRow][parseInt(colNum) - 1] || '';
      });
      // [list1.row1.cell1]
      text = text.replace(/\[list(\d+)\.row(\d+)\.cell(\d+)\]/g, (_, ln, rn, cn) => {
        const list = project.variables.lists[parseInt(ln) - 1];
        if (!list) return '';
        const row = list.rows[parseInt(rn) - 1];
        return row ? (row[parseInt(cn) - 1] || '') : '';
      });
      return text;
    }

    // ─── Show graphic ──────────────────────────────────────────────────────
    function showGraphic(g) {
      const container = document.getElementById('graphicsContainer');
      let el;

      switch (g.type) {
        case 'lower_third': {
          const ltItems = g.content.items || (g.content.title != null
            ? [{title: g.content.title, subtitle: g.content.subtitle || ''}]
            : []);
          const ltCur = g.content.current || 1;
          const ltItem = ltItems[ltCur - 1] || {title: '', subtitle: ''};
          el = createElement('div', `lower_third graphic-show`, `
            <div class="lt-bar"></div>
            <div class="lt-body">
              <div class="lt-title">${esc(replaceVars(ltItem.title))}</div>
              <div class="lt-subtitle">${esc(replaceVars(ltItem.subtitle))}</div>
            </div>
          `);
          el.style.setProperty('--scale', pctScale(g.content.size));
          break;
        }

        case 'message':
          el = createElement('div', `message graphic-show`, `
            <div class="msg-badge">${esc(replaceVars(g.content.header != null ? g.content.header : 'ALERT'))}</div>
            <div class="msg-body">
              <div class="msg-text">${esc(replaceVars(g.content.text))}</div>
              <div class="msg-detail">${esc(replaceVars(g.content.detail))}</div>
            </div>
          `);
          el.style.setProperty('--scale', pctScale(g.content.size));
          break;

        case 'ticker':
          const items = g.content.items.map(i => `<span>${esc(replaceVars(i))}</span>`).join('');
          const dur = Math.max(10, g.content.items.length * (60 / (g.content.speed || 60)) * 5);
          el = createElement('div', `ticker graphic-show`, `
            <div class="ticker-label">LATEST</div>
            <div class="ticker-track">
              <div class="ticker-content" style="animation: ticker-scroll ${dur}s linear infinite">
                ${items}${items}
              </div>
            </div>
          `);
          break;

        case 'agenda': {
          const title = g.content.title || '';
          const titleHtml = title ? `<div class="agenda-title">${esc(replaceVars(title))}</div>` : '';
          const cur = g.content.currentItem || 0;
          const solo = !!g.content.solo;
          let cls = 'agenda graphic-show';
          if (cur) cls += ' has-current';
          if (solo) cls += ' solo';
          if (g.content.soloShowHeading) cls += ' solo-show-heading';
          if (g.content.soloShowItem !== false) cls += ' solo-show-item';
          el = createElement('div', cls, `
            <div class="agenda-body">
              ${titleHtml}
              <ul class="agenda-list">${renderAgendaItems(g.content.items, cur)}</ul>
            </div>
          `);
          el.style.setProperty('--scale', pctScale(agendaActiveSize(g)));
          break;
        }

        case 'image': {
          const imShadow = g.content.shadow !== false;
          el = createElement('div', `image-graphic graphic-show${imShadow ? '' : ' no-shadow'}`, `
            <img src="${esc(replaceVars(g.content.url))}" style="object-fit:${g.content.sizing}" onerror="this.style.display='none'">
          `);
          el.style.setProperty('--scale', pctScale(g.content.size));
          break;
        }

        case 'image_gallery': {
          const gImgs = g.content.images || [];
          const gCur = g.content.current || 0;
          const gUrl = (gCur > 0 && gImgs[gCur - 1]) ? gImgs[gCur - 1] : '';
          el = createElement('div', `image-graphic graphic-show`, `
            <img src="${esc(replaceVars(gUrl))}" style="object-fit:${g.content.sizing || 'contain'}; ${gUrl ? '' : 'display:none;'}" onerror="this.style.display='none'">
          `);
          break;
        }

        case 'timer': {
          const initSec = g.content.mode === 'countup' ? 0
            : g.content.mode === 'clock' ? (() => { const n = new Date(); return n.getHours()*3600+n.getMinutes()*60+n.getSeconds(); })()
            : (g.content.duration || 300);
          const initDisplay = formatTime(initSec, g.content.format || 'mm:ss');
          el = createElement('div', `timer-graphic graphic-show`, `
            <div class="timer-bg">
              <div class="timer-label">${esc(replaceVars(g.content.label))}</div>
              <div class="timer-display" id="timer-${g.id}">${initDisplay}</div>
            </div>
          `);
          el.style.setProperty('--scale', pctScale(g.content.size));
          break;
        }

        case 'score':
          el = createElement('div', `score-graphic graphic-show`, `
            <div class="score-team" style="background:${g.content.team1.color}">
              <div class="team-name">${esc(replaceVars(g.content.team1.name))}</div>
              <div class="team-score" id="score-t1-${g.id}">${g.content.team1.score}</div>
            </div>
            <div class="score-vs">VS</div>
            <div class="score-team" style="background:${g.content.team2.color}">
              <div class="team-name">${esc(replaceVars(g.content.team2.name))}</div>
              <div class="team-score" id="score-t2-${g.id}">${g.content.team2.score}</div>
            </div>
          `);
          break;

        case 'social_comment':
          el = createElement('div', `social-comments graphic-show`, renderSocialCommentsInner(g));
          el.style.setProperty('--scale', pctScale(g.content.size));
          break;

        default:
          return;
      }

      el.dataset.graphicId = g.id;
      el.dataset.graphicType = g.type;

      // Apply saved position if exists (per active slot for agenda solo mode)
      const activePos = getActivePosition(g);
      if (activePos && activePos.x != null && activePos.y != null) {
        applyPosition(el, activePos.x, activePos.y);
      } else {
        // Auto-offset for multiple graphics of the same type
        const sameType = container.querySelectorAll('[data-graphic-type="' + g.type + '"]');
        if (sameType.length > 0) {
          const offset = sameType.length;
          if (g.type === 'lower_third') el.style.bottom = (80 + offset * 90) + 'px';
          else if (g.type === 'message') el.style.top = (50 + offset * 130) + 'px';
          else if (g.type === 'score-graphic' || el.classList.contains('score-graphic')) el.style.top = (30 + offset * 110) + 'px';
        }
      }

      // Make draggable in preview/output
      makeDraggable(el, g.id);

      container.appendChild(el);
      liveGraphics.set(g.id, el);

      // Init timer after element is in the DOM so renderTimer can find it
      if (g.type === 'timer') initTimer(g);
    }

    // ─── Hide graphic ──────────────────────────────────────────────────────
    function hideGraphic(g) {
      hideGraphicById(g.id);
    }

    function hideGraphicById(id) {
      const el = liveGraphics.get(id);
      if (!el) return;

      // Immediately remove from tracking to prevent race conditions
      // between graphic:hide and project:update both calling this
      liveGraphics.delete(id);

      // Stop timer if any
      const ts = timerStates.get(id);
      if (ts && ts.interval) clearInterval(ts.interval);
      timerStates.delete(id);

      el.classList.remove('graphic-show');
      el.classList.add('graphic-hide');

      let removed = false;
      const cleanup = () => {
        if (removed) return;
        removed = true;
        el.remove();
      };

      // Only react to animations on this element, not children bubbling up
      el.addEventListener('animationend', (e) => {
        if (e.target === el) cleanup();
      });

      // Guaranteed fallback
      setTimeout(cleanup, 1000);
    }

    // ─── Update graphic content in-place ───────────────────────────────────
    function updateGraphicContent(g) {
      const el = liveGraphics.get(g.id);
      if (!el) return;

      switch (g.type) {
        case 'lower_third': {
          const ltItems = g.content.items || (g.content.title != null
            ? [{title: g.content.title, subtitle: g.content.subtitle || ''}]
            : []);
          const ltCur = g.content.current || 1;
          const ltItem = ltItems[ltCur - 1] || {title: '', subtitle: ''};
          el.querySelector('.lt-title').textContent = replaceVars(ltItem.title);
          el.querySelector('.lt-subtitle').textContent = replaceVars(ltItem.subtitle);
          el.style.setProperty('--scale', pctScale(g.content.size));
          break;
        }
        case 'message':
          el.querySelector('.msg-badge').textContent = replaceVars(g.content.header != null ? g.content.header : 'ALERT');
          el.querySelector('.msg-text').textContent = replaceVars(g.content.text);
          el.querySelector('.msg-detail').textContent = replaceVars(g.content.detail);
          el.style.setProperty('--scale', pctScale(g.content.size));
          break;
        case 'score': {
          const t1 = el.querySelector(`#score-t1-${g.id}`);
          const t2 = el.querySelector(`#score-t2-${g.id}`);
          if (t1) t1.textContent = g.content.team1.score;
          if (t2) t2.textContent = g.content.team2.score;
          const teams = el.querySelectorAll('.score-team');
          if (teams[0]) {
            teams[0].style.background = g.content.team1.color;
            teams[0].querySelector('.team-name').textContent = replaceVars(g.content.team1.name);
          }
          if (teams[1]) {
            teams[1].style.background = g.content.team2.color;
            teams[1].querySelector('.team-name').textContent = replaceVars(g.content.team2.name);
          }
          break;
        }
        case 'ticker': {
          const items = g.content.items.map(i => `<span>${esc(replaceVars(i))}</span>`).join('');
          const dur = Math.max(10, g.content.items.length * (60 / (g.content.speed || 60)) * 5);
          const content = el.querySelector('.ticker-content');
          if (content) {
            content.innerHTML = items + items;
            content.style.animation = `ticker-scroll ${dur}s linear infinite`;
          }
          break;
        }
        case 'agenda': {
          const title = g.content.title || '';
          const body = el.querySelector('.agenda-body');
          if (body) {
            let titleEl = body.querySelector('.agenda-title');
            if (title && !titleEl) {
              titleEl = document.createElement('div');
              titleEl.className = 'agenda-title';
              body.insertBefore(titleEl, body.firstChild);
            } else if (!title && titleEl) {
              titleEl.remove();
            }
            if (titleEl) titleEl.textContent = replaceVars(title);
          }
          const cur = g.content.currentItem || 0;
          el.classList.toggle('has-current', !!cur);
          const wasSolo = el.classList.contains('solo');
          const isSolo = !!g.content.solo;
          // INTO solo: freeze the list's current height as min-height so that,
          // combined with the .agenda's justify-content:flex-end, the body stays
          // anchored to the bottom during the collapse (folds downward). Must set
          // this before toggling .solo so the frozen height is in place when the
          // list items begin collapsing.
          if (isSolo && !wasSolo) {
            el.style.minHeight = el.offsetHeight + 'px';
          }
          el.classList.toggle('solo', isSolo);
          el.classList.toggle('solo-show-heading', !!g.content.soloShowHeading);
          el.classList.toggle('solo-show-item', g.content.soloShowItem !== false);
          if (isSolo && !wasSolo) {
            // Force a reflow so the frozen min-height is committed, then release
            // it to the exact body-solo size. In solo the list's gap collapses
            // to 0 (see .agenda.solo .agenda-list), so body.h is just the
            // current item's solo height — no gap term. Landing min-height on
            // that value means agenda.height = min-height = body.height at the
            // end of the motion: one continuous slide, same end position for
            // every current pick.
            void el.offsetHeight;
            const scale = parseFloat(getComputedStyle(el).getPropertyValue('--scale')) || 1.25;
            // Current item in solo: font-size 32*scale, line-height 1.3, padding 16*scale top+bottom.
            const currentItemSoloH = (32 * 1.3 + 32) * scale; // 73.6 * scale
            el.style.minHeight = currentItemSoloH + 'px';
          } else if (!isSolo && wasSolo) {
            // Clear any lingering frozen min-height when returning to list mode.
            el.style.minHeight = '';
          }
          if (isSolo !== wasSolo) {
            // Mode switched — apply the position saved for the new slot, or clear to CSS default
            const activePos = getActivePosition(g);
            if (activePos && activePos.x != null && activePos.y != null) {
              applyPosition(el, activePos.x, activePos.y);
            } else {
              clearInlinePosition(el);
            }
          }
          const list = el.querySelector('.agenda-list');
          if (list) list.innerHTML = renderAgendaItems(g.content.items, cur);
          el.style.setProperty('--scale', pctScale(agendaActiveSize(g)));
          break;
        }
        case 'image': {
          const img = el.querySelector('img');
          if (img) {
            img.src = replaceVars(g.content.url);
            img.style.objectFit = g.content.sizing;
          }
          el.classList.toggle('no-shadow', g.content.shadow === false);
          el.style.setProperty('--scale', pctScale(g.content.size));
          break;
        }
        case 'image_gallery': {
          const gImgs = g.content.images || [];
          const gCur = g.content.current || 0;
          const gUrl = (gCur > 0 && gImgs[gCur - 1]) ? gImgs[gCur - 1] : '';
          const img = el.querySelector('img');
          if (img) {
            if (gUrl) { img.src = replaceVars(gUrl); img.style.display = ''; }
            else { img.style.display = 'none'; }
            img.style.objectFit = g.content.sizing || 'contain';
          }
          break;
        }
        case 'timer': {
          const labelEl = el.querySelector('.timer-label');
          if (labelEl) labelEl.textContent = replaceVars(g.content.label);
          el.style.setProperty('--scale', pctScale(g.content.size));
          break;
        }
        case 'social_comment': {
          el.innerHTML = renderSocialCommentsInner(g);
          el.style.setProperty('--scale', pctScale(g.content.size));
          break;
        }
      }
    }

    function renderSocialCommentsInner(g) {
      const items = (g.content.current || []).slice(0, g.content.maxVisible || 3);
      if (!items.length) return '';
      const showAvatar = g.content.showAvatar !== false;
      const showBadge = g.content.showPlatformBadge !== false;
      const labels = { twitch: 'Twitch', youtube: 'YouTube', kick: 'Kick', x: 'X' };
      return items.map(c => {
        const plat = c.platform || '';
        const avatar = showAvatar && c.authorAvatar
          ? `<img class="sc-avatar" src="${esc(c.authorAvatar)}" onerror="this.style.display='none'">`
          : '';
        const badge = showBadge
          ? `<span class="sc-badge platform-${esc(plat)}">${esc(labels[plat] || plat)}</span>`
          : '';
        return `
          <div class="sc-item platform-${esc(plat)}">
            <div class="sc-head">
              ${avatar}
              <span class="sc-author">${esc(c.author || '')}</span>
              ${badge}
            </div>
            <div class="sc-text">${esc(c.text || '')}</div>
          </div>
        `;
      }).join('');
    }

    // ─── Timer logic ───────────────────────────────────────────────────────
    function initTimer(g) {
      const state = {
        mode: g.content.mode,
        duration: g.content.duration || 300,
        remaining: g.content.mode === 'countup' ? 0 : (g.content.duration || 300),
        running: false,
        interval: null,
        format: g.content.format || 'mm:ss'
      };
      timerStates.set(g.id, state);

      if (g.content.mode === 'clock') {
        state.interval = setInterval(() => renderTimer(g.id), 1000);
        renderTimer(g.id);
      } else {
        renderTimer(g.id);
        startTimer(g.id);
      }
    }

    function startTimer(id) {
      const ts = timerStates.get(id);
      if (!ts || ts.running || ts.mode === 'clock') return;
      ts.running = true;
      ts.interval = setInterval(() => {
        if (ts.mode === 'countdown') {
          ts.remaining--;
          if (ts.remaining <= 0) { ts.remaining = 0; pauseTimer(id); }
        } else {
          ts.remaining++;
          if (ts.remaining >= ts.duration) { ts.remaining = ts.duration; pauseTimer(id); }
        }
        renderTimer(id);
      }, 1000);
    }

    function pauseTimer(id) {
      const ts = timerStates.get(id);
      if (!ts) return;
      ts.running = false;
      if (ts.interval) { clearInterval(ts.interval); ts.interval = null; }
    }

    function resetTimer(id) {
      const ts = timerStates.get(id);
      if (!ts) return;
      pauseTimer(id);
      ts.remaining = ts.mode === 'countup' ? 0 : ts.duration;
      renderTimer(id);
    }

    function renderTimer(id) {
      const ts = timerStates.get(id);
      if (!ts) return;
      const el = document.getElementById(`timer-${id}`);
      if (!el) return;

      if (ts.mode === 'clock') {
        const now = new Date();
        el.textContent = formatTime(now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds(), ts.format);
        return;
      }
      el.textContent = formatTime(ts.remaining, ts.format);
    }

    function formatTime(totalSec, fmt) {
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;

      let result = fmt;
      result = result.replace('HH', String(h).padStart(2, '0'));
      result = result.replace('H', String(h));
      result = result.replace('mm', String(m).padStart(2, '0'));
      result = result.replace('m', String(m));
      result = result.replace('ss', String(s).padStart(2, '0'));
      result = result.replace('s', String(s));
      return result;
    }

    // ─── Helpers ───────────────────────────────────────────────────────────
    function createElement(tag, className, innerHTML) {
      const el = document.createElement(tag);
      el.className = className;
      el.innerHTML = innerHTML;
      return el;
    }

    function esc(s) {
      if (s == null) return '';
      const d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML;
    }

    function renderAgendaItems(items, current) {
      items = items || [];
      const isSubLine = s => String(s).trim().startsWith('-');
      // If current points at a sub-item, find its parent main's line index (1-based).
      let currentParent = 0;
      if (current > 0 && current <= items.length && isSubLine(items[current - 1])) {
        for (let i = current - 2; i >= 0; i--) {
          if (!isSubLine(items[i])) { currentParent = i + 1; break; }
        }
      }
      // If current is a main, remember it so its direct sub-children can be marked as context.
      const currentMain = (current > 0 && !isSubLine(items[current - 1])) ? current : 0;
      let lastMainLine = 0;
      return items.map((line, i) => {
        const lineN = i + 1;
        const trimmed = String(line).trim();
        const isSub = trimmed.startsWith('-');
        if (!isSub) lastMainLine = lineN;
        const text = isSub ? trimmed.slice(1).trim() : line;
        let cls = isSub ? 'agenda-sub' : 'agenda-item';
        if (lineN === current) cls += ' agenda-current';
        else if (isSub && currentMain && lastMainLine === currentMain) cls += ' agenda-current-sub';
        else if (!isSub && currentParent && lineN === currentParent) cls += ' agenda-current-parent';
        return `<li class="${cls}">${esc(replaceVars(text))}</li>`;
      }).join('');
    }

    function pctScale(size) {
      const s = (size != null ? size : 50);
      return s / 40;
    }
    function agendaActiveSize(g) {
      if (!g.content) return 50;
      if (g.content.solo) return g.content.sizeSolo != null ? g.content.sizeSolo : g.content.size;
      return g.content.size;
    }

    // ─── Drag to reposition ─────────────────────────────────────────────
    function applyPosition(el, x, y) {
      el.style.cssText += '; position:absolute; inset:auto; left:' + x + 'px; top:' + y + 'px; bottom:auto; right:auto; margin:0;';
    }
    function clearInlinePosition(el) {
      el.style.left = '';
      el.style.top = '';
      el.style.bottom = '';
      el.style.right = '';
      el.style.inset = '';
      el.style.margin = '';
      el.style.position = '';
    }
    function getActivePosition(g) {
      if (g.type === 'agenda' && g.content && g.content.solo) return g.positionSolo;
      return g.position;
    }

    function makeDraggable(el, graphicId) {
      el.classList.add('graphic-draggable');
      let startMouseX, startMouseY, startElX, startElY, dragging = false, dragSlot = null;

      el.addEventListener('mousedown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
        e.preventDefault();
        dragging = true;
        startMouseX = e.pageX;
        startMouseY = e.pageY;
        // Always use offsetLeft/offsetTop — works regardless of CSS positioning mode
        startElX = el.offsetLeft;
        startElY = el.offsetTop;
        // Lock the slot at drag-start so a class change mid-drag doesn't redirect the save
        dragSlot = el.classList.contains('solo') ? 'solo' : null;
        applyPosition(el, startElX, startElY);
        el.style.transition = 'none';
      });

      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const dx = e.pageX - startMouseX;
        const dy = e.pageY - startMouseY;
        el.style.left = (startElX + dx) + 'px';
        el.style.top = (startElY + dy) + 'px';
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        el.style.transition = '';
        const x = parseInt(el.style.left) || 0;
        const y = parseInt(el.style.top) || 0;
        // Save via REST (reliable across iframes)
        fetch('/api/' + PROJECT_ID + '/graphic/' + graphicId + '/position', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ x, y, slot: dragSlot })
        });
      });
    }
  </script>
</body>
</html>
