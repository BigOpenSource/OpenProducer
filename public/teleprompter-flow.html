<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teleprompter — Flow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #141420;
      --border: #2e2e44;
      --text: #e8e8f0;
      --text-dim: #444460;
      --text-read: #666680;
      --accent: #6c5ce7;
      --red: #e63946;
      --green: #2ecc71;
      --yellow: #f1c40f;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text-dim);
      min-height: 100vh;
    }

    /* ─── Header ──────── */
    .tp-header {
      position: sticky; top: 0; z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .tp-header h1 { font-size: 16px; font-weight: 700; color: var(--text); flex: 1; }
    .tp-header .tp-progress {
      font-size: 13px; color: var(--text-dim); font-variant-numeric: tabular-nums;
    }
    .tp-header button {
      padding: 6px 14px; font-size: 13px; font-weight: 600;
      border: none; border-radius: 6px; cursor: pointer;
      font-family: inherit;
    }
    .tp-header .btn-reset { background: var(--border); color: var(--text); }
    .tp-header .btn-reset:hover { background: #444; }
    .tp-font-controls { display: flex; align-items: center; gap: 4px; }
    .tp-font-controls button {
      width: 28px; height: 28px; padding: 0; font-size: 16px;
      background: var(--border); color: var(--text); border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .tp-font-controls span {
      font-size: 12px; color: var(--text-dim); min-width: 36px; text-align: center;
    }

    /* ─── Flow body ──────── */
    .flow-body {
      max-width: 800px; margin: 0 auto;
      padding: 40px 30px 200px 60px;
    }

    /* ─── Step spacer ──────── */
    .flow-marker {
      height: 24px;
    }

    /* ─── Pointer triangle ──────── */
    .flow-pointer {
      position: absolute;
      left: 2px; top: 12px;
      width: 0; height: 0;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      border-left: 18px solid var(--accent);
      opacity: 0; transition: opacity 0.3s;
      filter: drop-shadow(0 0 6px rgba(108,92,231,0.5));
      z-index: 2;
    }
    .flow-text-wrap.current .flow-pointer,
    .flow-cue.pointing .flow-pointer { opacity: 1; }

    /* ─── Text block ──────── */
    .flow-text-wrap {
      position: relative;
      padding-left: 40px;
    }
    .flow-text {
      font-size: 32px; line-height: 1.6;
      white-space: pre-wrap; word-wrap: break-word;
      transition: color 0.3s;
    }
    .flow-text-wrap.done .flow-text { color: var(--text-dim); }
    .flow-text-wrap.current .flow-text { color: #fff; }
    .flow-text-wrap.upcoming .flow-text { color: var(--text-dim); }

    /* ─── Cue bar (inline) ──────── */
    .flow-cue {
      display: flex; align-items: center; gap: 8px;
      margin: 0 0 24px; padding: 10px 14px;
      margin-left: 40px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: border-color 0.3s, opacity 0.3s;
      position: relative;
    }
    .flow-cue.current { border-color: var(--accent); }
    .flow-cue.done { opacity: 0.35; }
    .flow-cue .cue-badges {
      display: flex; flex-direction: column; gap: 4px; flex: 1;
    }
    .flow-cue .cue-badge {
      font-size: 13px; padding: 4px 10px; border-radius: 5px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .cue-badge.show { background: rgba(46,204,113,0.15); color: var(--green); }
    .cue-badge.hide { background: rgba(230,57,70,0.15); color: var(--red); }
    .cue-badge.update { background: rgba(108,92,231,0.15); color: var(--accent); }
    .cue-badge.obs { background: rgba(241,196,15,0.15); color: var(--yellow); }
    .cue-badge.wait { background: rgba(255,255,255,0.08); color: var(--text-dim); font-style: italic; }
    .cue-badge.layout { background: rgba(108,92,231,0.15); color: #a78bfa; }

    .flow-fire-btn {
      padding: 6px 20px; font-size: 13px; font-weight: 700;
      background: var(--accent); color: #fff; border: none;
      border-radius: 6px; cursor: pointer; font-family: inherit;
      white-space: nowrap; flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .flow-fire-btn:hover { background: #7f70f0; }
    .flow-fire-btn:active { transform: scale(0.97); }
    .flow-fire-btn.fired { background: var(--green); cursor: default; }

    /* Pointer on cue bar */
    .flow-cue .flow-pointer {
      left: -38px; top: 50%; transform: translateY(-50%);
    }
    .flow-cue.pointing .flow-pointer { opacity: 1; }

    /* Fired - fade out */
    .flow-cue.just-fired {
      border-color: var(--green);
      background: rgba(46,204,113,0.08);
      opacity: 0.25;
      transition: opacity 0.6s ease;
    }

    .flow-end {
      text-align: center; padding: 60px 20px; color: var(--text-dim);
      font-size: 18px; margin-left: 36px;
    }

    /* ─── Keyboard hint ──────── */
    .tp-hint {
      position: fixed; bottom: 16px; right: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px; font-size: 12px;
      color: var(--text-dim);
    }
    .tp-hint kbd {
      background: var(--border); padding: 2px 6px; border-radius: 3px;
      font-family: inherit; font-size: 11px; color: var(--text);
    }
  </style>
</head>
<body>
  <div class="tp-header">
    <h1 id="scriptName">Script</h1>
    <div class="tp-font-controls">
      <button onclick="changeFontSize(-4)">A-</button>
      <span id="fontSizeLabel">32px</span>
      <button onclick="changeFontSize(4)">A+</button>
    </div>
    <span class="tp-progress" id="progress">0 / 0</span>
    <button class="btn-reset" onclick="clearAll()" style="background:#e63946;color:#fff">Clear</button>
    <button class="btn-reset" onclick="resetScript()">Reset</button>
  </div>
  <div id="obsPanel" style="max-width:800px;margin:12px auto 0;padding:0 30px"></div>
  <div class="flow-body" id="flowBody"></div>
  <div class="tp-hint"><kbd>Space</kbd> or <kbd>Enter</kbd> to fire cue &amp; advance</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const pathParts = window.location.pathname.split('/');
    const PROJECT_ID = pathParts[2];
    const SCRIPT_ID = pathParts[3];
    const socket = io();
    let project = null;
    let script = null;
    let currentStep = 0;
    // subStep: 'cue' = pointer on cue bar, 'fired' = just fired, 'text' = pointer on text (read it)
    let subStep = 'cue'; // will be set properly on first load
    let firedSteps = new Set();
    let fontSize = 32;

    socket.emit('join', PROJECT_ID);

    socket.on('project:update', (p) => {
      project = p;
      if (!project.scripts) project.scripts = [];
      script = project.scripts.find(s => s.id === SCRIPT_ID);
      if (script) {
        document.getElementById('scriptName').textContent = script.name;
        // Set initial subStep on first load
        if (currentStep === 0 && !firedSteps.size) {
          subStep = (script.steps[0] && script.steps[0].actions.length > 0) ? 'cue' : 'text';
        }
        renderObsPanel();
        setTimeout(flTestScenes, 200);
        renderFlow();
      }
    });

    function getRequiredScenes() {
      if (!script) return [];
      const scenes = new Set();
      for (const step of script.steps) {
        for (const a of step.actions) {
          if (a.type === 'obs' && a.obsAction === 'switch_scene' && a.obsValue) scenes.add(a.obsValue);
          if (a.type === 'layout') {
            const layout = (project.layouts || []).find(l => l.id === a.layoutId);
            if (layout && layout.obsScene) scenes.add(layout.obsScene);
          }
        }
      }
      return [...scenes];
    }

    function renderObsPanel() {
      const scenes = getRequiredScenes();
      const panel = document.getElementById('obsPanel');
      if (!scenes.length) { panel.innerHTML = ''; return; }
      panel.innerHTML = `<div id="fl-obs-panel" style="border:1px solid var(--border);border-radius:8px;overflow:hidden">
        <div style="padding:8px 12px;background:var(--surface);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)">
          <span style="font-size:14px">🎥</span>
          <span style="font-size:12px;font-weight:600;flex:1">Required OBS Scenes</span>
          <span id="fl-obs-conn" style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text-dim)">
            <span style="width:8px;height:8px;border-radius:50%;background:#555;display:inline-block"></span> OBS
          </span>
          <button id="fl-obs-connect-btn" onclick="flQuickConnect()" style="font-size:10px;padding:3px 10px;background:var(--border);color:var(--text);border:none;border-radius:4px;cursor:pointer">Connect</button>
          <button onclick="flTestScenes()" style="font-size:10px;padding:3px 10px;background:var(--border);color:var(--text);border:none;border-radius:4px;cursor:pointer">Test Scenes</button>
        </div>
        <div style="padding:8px 12px;display:flex;flex-wrap:wrap;gap:6px">
          ${scenes.map(s => `<span class="fl-scene-tag" data-scene="${esc(s)}" style="display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px">
            <span class="s-dot" style="width:8px;height:8px;border-radius:50%;background:#555;display:inline-block"></span>
            ${esc(s)}
          </span>`).join('')}
        </div>
      </div>`;
    }

    async function flTestScenes() {
      const scenes = getRequiredScenes();
      const res = await fetch('/api/obs/test-scenes', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ scenes })
      });
      const data = await res.json();
      const conn = document.getElementById('fl-obs-conn');
      if (conn) {
        if (data.connected) {
          conn.innerHTML = '<span style="width:8px;height:8px;border-radius:50%;background:#2ecc71;box-shadow:0 0 6px #2ecc71;display:inline-block"></span> Connected';
          const cb = document.getElementById('fl-obs-connect-btn');
          if (cb) cb.style.display = 'none';
        } else {
          conn.innerHTML = '<span style="width:8px;height:8px;border-radius:50%;background:#e63946;display:inline-block"></span> Not connected';
          return;
        }
      }
      document.querySelectorAll('.fl-scene-tag').forEach(tag => {
        const dot = tag.querySelector('.s-dot');
        if (data.results[tag.dataset.scene]) { dot.style.background = '#2ecc71'; dot.style.boxShadow = '0 0 6px #2ecc71'; }
        else { dot.style.background = '#e63946'; dot.style.boxShadow = '0 0 6px #e63946'; }
      });
    }

    function flQuickConnect() {
      const s = project && project.settings;
      if (s && s.obsUrl) {
        socket.emit('obs:connect', { url: s.obsUrl, password: s.obsPassword });
        setTimeout(flTestScenes, 2000);
      } else {
        const url = prompt('OBS WebSocket URL:', 'ws://localhost:4455');
        if (!url) return;
        const pw = prompt('OBS Password (leave blank if none):', '');
        socket.emit('obs:connect', { url, password: pw });
        setTimeout(flTestScenes, 2000);
      }
    }

    function badgeHTML(a) {
      if (a.type === 'layout') {
        const layout = (project.layouts||[]).find(l => l.id === a.layoutId);
        return `<span class="cue-badge layout">${esc('Layout: ' + (layout ? layout.name : '?'))}</span>`;
      }
      if (a.type === 'wait') {
        return `<span class="cue-badge wait">Wait ${a.duration || 1}s</span>`;
      }
      if (a.type === 'obs') {
        const obsLabels = {
          switch_scene: 'Scene', start_stream: 'Start Stream', stop_stream: 'Stop Stream',
          toggle_stream: 'Toggle Stream', start_record: 'Start Rec', stop_record: 'Stop Rec',
          toggle_record: 'Toggle Rec', mute: 'Mute', unmute: 'Unmute', toggle_mute: 'Toggle Mute'
        };
        const label = `OBS: ${obsLabels[a.obsAction] || a.obsAction}${a.obsValue ? ': ' + a.obsValue : ''}`;
        return `<span class="cue-badge obs">${esc(label)}</span>`;
      }
      const g = project.graphics.find(g => g.id === a.graphicId);
      const name = g ? g.name : '?';
      let label = '';
      if (a.type === 'show') label = `Show: ${name}`;
      else if (a.type === 'hide') label = `Hide: ${name}`;
      else if (a.type === 'update') label = `${name}.${a.path} = ${a.value}`;
      return `<span class="cue-badge ${a.type}">${esc(label)}</span>`;
    }

    function renderFlow() {
      if (!script) return;
      const body = document.getElementById('flowBody');
      document.getElementById('progress').textContent =
        `${Math.min(currentStep + 1, script.steps.length)} / ${script.steps.length}`;

      const step = script.steps[currentStep];
      const hasActions = step && step.actions.length > 0;

      let html = '';
      script.steps.forEach((step, i) => {
        const state = i < currentStep ? 'done' : i === currentStep ? 'current' : 'upcoming';
        const fired = firedSteps.has(i);
        const isCurrent = i === currentStep;
        const pointerOnText = isCurrent && subStep === 'text';
        const pointerOnCue = isCurrent && subStep === 'cue';
        const justFired = isCurrent && subStep === 'fired';

        // Step marker (minimal divider)
        html += '<div class="flow-marker ' + state + '" id="step-' + i + '"><div class="marker-line"></div></div>';

        // Cue bar (fires before reading the text — sets up visuals)
        if (step.actions.length > 0) {
          const badges = step.actions.map(badgeHTML).join('');
          var pointer = pointerOnCue ? '<div class="flow-pointer"></div>' : '';
          var cueClass = 'flow-cue ' + state + (pointerOnCue ? ' pointing' : '') + (fired ? ' just-fired' : '');
          html += '<div class="' + cueClass + '" id="cue-' + i + '">' + pointer + '<div class="cue-badges">' + badges + '</div></div>';
        }

        // Text with pointer (read after actions fire)
        if (step.text) {
          var textState = pointerOnText ? 'current' : (state === 'current' ? 'upcoming' : state);
          var twClass = 'flow-text-wrap ' + textState + (pointerOnText ? ' current' : '');
          var twPointer = pointerOnText ? '<div class="flow-pointer"></div>' : '';
          html += '<div class="' + twClass + '">' + twPointer + '<div class="flow-text" style="font-size:' + fontSize + 'px">' + esc(step.text) + '</div></div>';
        }
      });

      html += '<div class="flow-end">— End of script —</div>';
      body.innerHTML = html;

      // Scroll the active element into view
      let scrollTarget;
      if (subStep === 'cue' || subStep === 'fired') {
        scrollTarget = document.getElementById(`cue-${currentStep}`);
      }
      if (!scrollTarget) scrollTarget = document.getElementById(`step-${currentStep}`);
      if (scrollTarget) {
        const rect = scrollTarget.getBoundingClientRect();
        const inView = rect.top >= 0 && rect.bottom <= window.innerHeight;
        if (!inView) scrollTarget.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    function fireCue(stepIdx) {
      const step = script.steps[stepIdx];
      if (!step || firedSteps.has(stepIdx)) return;
      if (step.actions.length > 0) {
        socket.emit('script:execute', {
          projectId: PROJECT_ID,
          actions: step.actions
        });
      }
      firedSteps.add(stepIdx);
      // If no text, auto-advance to next step
      if (!step.text) {
        if (currentStep < script.steps.length - 1) {
          currentStep++;
          const nextStep = script.steps[currentStep];
          subStep = (nextStep && nextStep.actions.length > 0) ? 'cue' : 'text';
        }
      } else {
        subStep = 'text';
      }
      renderFlow();
    }

    function advance() {
      const step = script.steps[currentStep];
      if (!step) return;
      const hasActions = step.actions.length > 0;

      if (subStep === 'cue') {
        // Fire the cue
        fireCue(currentStep);
      } else if (subStep === 'fired') {
        // Move to text after firing
        subStep = 'text';
        renderFlow();
      } else if (subStep === 'text') {
        // Done reading text → advance to next step
        if (currentStep < script.steps.length - 1) {
          currentStep++;
          // If next step has actions, start on cue; otherwise start on text
          const nextStep = script.steps[currentStep];
          subStep = (nextStep && nextStep.actions.length > 0) ? 'cue' : 'text';
          renderFlow();
        }
      }
    }

    function clearAll() {
      fetch('/api/' + PROJECT_ID + '/clear', { method: 'POST' });
    }

    function resetScript() {
      currentStep = 0;
      subStep = (script && script.steps[0] && script.steps[0].actions.length > 0) ? 'cue' : 'text';
      firedSteps.clear();
      renderFlow();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function changeFontSize(delta) {
      fontSize = Math.max(16, Math.min(72, fontSize + delta));
      document.getElementById('fontSizeLabel').textContent = fontSize + 'px';
      document.querySelectorAll('.flow-text').forEach(el => el.style.fontSize = fontSize + 'px');
    }

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        advance();
      } else if (e.key === 'ArrowDown' || e.key === 'PageDown') {
        e.preventDefault();
        if (currentStep < script.steps.length - 1) { currentStep++; subStep = 'text'; renderFlow(); }
      } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
        e.preventDefault();
        if (currentStep > 0) { currentStep--; subStep = 'text'; renderFlow(); }
      }
    });

    function esc(s) {
      if (s == null) return '';
      const d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML.replace(/`/g, '&#96;').replace(/\$/g, '&#36;');
    }
  </script>
</body>
</html>
